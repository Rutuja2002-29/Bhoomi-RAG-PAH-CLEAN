services:
  - type: web
    name: bhoomi-rag-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_URL
        sync: false
      - key: PDF_DATA_DIR
        value: data/pdfs
      - key: CHROMA_DB_PATH
        value: chroma_data
      - key: RAG_COLLECTION_NAME
        value: rice_crops
      - key: RAG_TOP_K
        value: "4"
      - key: CHUNK_SIZE
        value: "800"
      - key: CHUNK_OVERLAP
        value: "100"
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: LOG_LEVEL
        value: INFO
      - key: FRONTEND_ORIGINS
        value: "*"
